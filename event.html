<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event</title>
<link rel="icon" type="image/png" href="mood3.png">







<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("mood4.jpg") center/cover no-repeat;
font-family:Arial, sans-serif;}
.box{
background:rgba(0,0,0,0.65);
padding:50px;
border:14px double rgb(173,132,70);
text-align:center;
color:white;
width:420px;}
h1{
margin-top:0;
font-size:40px;
color:rgb(173,132,70);}

input{
width:100%;
padding:12px;
margin:15px 0;
font-size:18px;
border:2px solid rgb(173,132,70);
background:black;
color:white;
outline:none;}
button{
margin-top:20px;
padding:12px 30px;
font-size:20px;
background:black;
color:rgb(173,132,70);
border:3px solid rgb(173,132,70);
cursor:pointer;
margin-right:10px;}
button:hover{
background:rgb(173,132,70);
color:black;
}
.snow{
position:fixed;
top:-10px;
width:8px;
height:8px;
background:rgb(173,132,70);
border-radius:50%;
pointer-events:none;
animation:fall linear infinite;
}
@keyframes fall{
to{
transform:translateY(110vh);
}
}</style>






</head>
<body>
<div class="box">
<h1>Add Event</h1>
<input type="text" placeholder="Event name">
<input type="date"><br>
<button onclick="this.innerText='Saved'">Save</button><button onclick="location.href='ok.html'">Events</button>
</div>







<!--c.p from index.html-->
<script>
for(let i=0;i<40;i++){
let snow=document.createElement("div");
snow.className="snow";
snow.style.left=Math.random()*100+"vw";
snow.style.animationDuration=5+Math.random()*8+"s";
snow.style.opacity=Math.random();
snow.style.transform="scale("+(0.4+Math.random())+")";
document.body.appendChild(snow);
}
</script>







</body>
</html>
