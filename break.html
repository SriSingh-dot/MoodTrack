<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoodTrack</title>
<link rel="icon" type="image/png" href="mood3.png">
<link href="https://fonts.googleapis.com/css2?family=Allura&display=swap" rel="stylesheet">





<style>
body{
margin:0;
font-family:'Allura',cursive;
color:rgb(173,132,70);
}
.section{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}
.first{
background:url("mood2.jpg") center/cover no-repeat;
}
.second{
background:url("mood4.jpg") center/cover no-repeat;
}
.box{
max-width:700px;
}
h1{
font-size:140px;
margin:0;
}
p{
font-size:42px;
margin-top:10px;
}
a{
display:inline-block;
margin-top:25px;
padding:10px 40px;
font-size:30px;
text-decoration:none;
color:rgb(173,132,70);
border:3px solid rgb(173,132,70);
}
a:hover{
background:rgba(173,132,70,0.2);
}
.photo-frame{
width:700px;
height:450px;
border:12px solid rgb(173,132,70);
box-shadow:0 0 25px rgba(0,0,0,0.6);
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;}
.photo-frame img{
width:100%;
height:100%;
object-fit:cover;
}
.bigphoto{
max-width:80%;
max-height:70vh;
border:12px solid rgb(173,132,70);
box-shadow:0 0 25px rgba(0,0,0,0.6);
}
button{
margin-top:30px;
padding:10px 40px;
font-size:28px;
font-family:'Allura',cursive;
color:rgb(173,132,70);
background:transparent;
border:3px solid rgb(173,132,70);
cursor:pointer;
}
button:hover{
background:rgba(173,132,70,0.2);
}

</style>
</head>

<body>
<section class="section first">
<div class="box">
<h1>Take a Break</h1>
<p>
Pause for a moment.<br>
Breathe. Relax. Let your mind rest.
</p>
<a href="how.html">Back</a>
</div>




</section>
<section class="section second">
<div class="photo-frame">
<img src="ph1.jpg" id="photo">
</div>
<button onclick="nextPhoto()">Next</button>
</section>




<script>
let photos = [
"ph1.jpg",
"ph2.jpg",
"ph3.jpg",
"ph4.jpg",
"ph5.jpg",
"ph6.jpg"
];
let index = 0;
function nextPhoto(){
index++;
if(index >= photos.length){
index = 0;
}
document.getElementById("photo").src = photos[index];
}
</script>


</body>
</html>
