<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mood Calendar</title><link href="https://fonts.googleapis.com/css2?family=Allura&display=swap" rel="stylesheet">





<style>
body{
margin:0;
font-family:'Allura',cursive;
background:url("mood2.jpg") center/cover no-repeat fixed;
color:rgb(173,132,70);
text-align:center;}
h1{
font-size:80px;
margin-top:40px;
}
.month{
font-size:40px;
margin-bottom:20px;}
.moods{
margin:20px;}
.moods button{
margin:8px;
padding:10px 25px;
font-family:'Allura',cursive;
font-size:26px;
border:3px solid rgb(173,132,70);
background:transparent;
color:rgb(173,132,70);
cursor:pointer;
transition:0.3s;
}
.moods button:hover{
box-shadow:0 0 15px rgb(173,132,70);
}
.legend{
margin-top:15px;
display:flex;
justify-content:center;
gap:25px;
font-size:24px;
align-items:center;
flex-wrap:wrap;
}
.box{
display:inline-block;
width:20px;
height:20px;
margin-right:6px;
border:2px solid rgb(173,132,70);}
.angry{background:#ff4d4d;}
.happy{background:#4da6ff;}
.calm{background:#5cd65c;}
.sad{background:#b366ff;}
.tired{background:#999999;}
.calendar{
width:80%;
max-width:900px;
margin:auto;
display:grid;
grid-template-columns:repeat(7,1fr);
gap:12px;
}
.snow{
position:fixed;
top:-10px;
width:8px;
height:8px;
background:rgb(173,132,70);
border-radius:50%;
pointer-events:none;
animation:fall linear infinite;
}
@keyframes fall{
to{
transform:translateY(110vh);
}
} 
.day{
height:110px;
border:4px solid rgb(173,132,70);
display:flex;
justify-content:center;
align-items:center;
font-size:32px;
cursor:pointer;
background:rgba(255,255,255,0.2);
transition:0.3s;}
.day:hover{
box-shadow:0 0 20px rgb(173,132,70);
transform:scale(1.05);}
.stats{
margin-top:40px;
font-size:28px;
background:rgba(0,0,0,0.4);
display:inline-block;
padding:20px 40px;
border:3px solid rgb(133,95,40);
}</style>



</head>
<body>
<h1>Mood Calendar</h1><div class="month" id="monthName"></div>








<div class="moods">
<button onclick="setMood('#ff4d4d')">Angry</button>
<button onclick="setMood('#4da6ff')">Happy</button>
<button onclick="setMood('#5cd65c')">Calm</button>
<button onclick="setMood('#b366ff')">Sad</button>
<button onclick="setMood('#999999')">Tired</button></div>








<div class="legend">
<div><span class="box angry"></span> Angry</div>
<div><span class="box happy"></span> Happy</div>
<div><span class="box calm"></span> Calm</div>
<div><span class="box sad"></span> Sad</div>
<div><span class="box tired"></span> Tired</div></div>
<div class="calendar" id="calendar"></div>
<div class="stats" id="stats">
Mood Statistics</div>

















<script>const calendar=document.getElementById("calendar");
const statsBox=document.getElementById("stats");



let today=new Date();
let month=today.getMonth();
let year=today.getFullYear();
let monthNames=[
"January","February","March","April","May","June",
"July","August","September","October","November","December"
];




document.getElementById("monthName").innerText =
monthNames[month]+" "+year;
let days=new Date(year,month+1,0).getDate();let moodData=JSON.parse(localStorage.getItem("moods")) || {};let selectedMood="";
function setMood(color){
selectedMood=color;}
function updateStats(){let count={};
for(let day in moodData){
let color=moodData[day];if(!count[color]) count[color]=0;count[color]++;}
let text="<b>Mood Statistics</b><br><br>";for(let c in count){text+=`<span style="color:${c}">■</span> ${count[c]} days<br>`;}
statsBox.innerHTML=text;}
for(let i=1;i<=days;i++){
let box=document.createElement("div");
box.className="day";
box.innerText=i;
if(moodData[i]){
box.style.background=moodData[i];}
box.onclick=function(){
if(!selectedMood) return;
box.style.background=selectedMood;
moodData[i]=selectedMood;
localStorage.setItem("moods",JSON.stringify(moodData));
updateStats();};
calendar.appendChild(box);}
updateStats();
for(let i=0;i<40;i++){
let snow=document.createElement("div");
snow.className="snow";
snow.style.left=Math.random()*100+"vw";
snow.style.animationDuration=5+Math.random()*8+"s";
snow.style.opacity=Math.random();
snow.style.transform="scale("+(0.4+Math.random())+")";
document.body.appendChild(snow);
}
</script>






</body>
</html>
